<!-- import aframe and then ar.js with image tracking / location based features -->
<script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@1c2407b26c61958baa93967b5412487cd94b290b/dist/aframe-master.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

<!-- style for the loader -->
<style>
  .arjs-loader {
    height: 100%;
    width: 100%;
    position: absolute;
    top: 0;
    left: 0;
    background-color: rgba(0, 0, 0, 0.8);
    z-index: 9999;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .arjs-loader div {
    text-align: center;
    font-size: 1.25em;
    color: white;
  }
</style>

<body style="margin : 0px; overflow: hidden;">
  <!-- minimal loader shown until image descriptors are loaded. Loading may take a while according to the device computational power -->
  <div class="arjs-loader">
    <div>Loading, please wait...</div>
  </div>

  <!-- a-frame scene -->
  <a-scene
    vr-mode-ui="enabled: false;"
    renderer="logarithmicDepthBuffer: true;"
    embedded
    arjs="trackingMethod: best; sourceType: webcam;debugUIEnabled: false;"
  >
  <a-assets>
    <img id ="test-image" src="assets/test.png">
  </a-assets>
    <!-- a-nft is the anchor that defines an Image Tracking entity -->
    <!-- on 'url' use the path to the Image Descriptors created before. -->
    <!-- the path should end with the name without the extension e.g. if file is 'pinball.fset' the path should end with 'pinball' -->
    <a-nft
      type="nft"
      url="assets/photoNorthStar"
      smooth="true"
      smoothCount="10"
      smoothTolerance=".01"
      smoothThreshold="5"
    > 
    <a-entity shadow="cast:true; receive:true">

      <!-- children that avoid shadows -->
      <a-box position="-1 0.5 -3" rotation="0 45 0" height="100.5" color="#4CC3D9"></a-box>
      <a-sphere position="0 1.25 -5" radius="100.25" color="#EF2D5E"></a-sphere>
      <a-cylinder position="1 0.75 -3" radius="50" height="100.5" color="#FFC65D"></a-cylinder>
      <a-plane position="0 0 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4"></a-plane>
    </a-entity>
    </a-nft>
    <!-- <a-animation attributte="rotation"
    dur="2000"
    from="0 0 0"
    to="270 180 90"
    repeat="indefinite"
    > -->
    <!-- parent that shadows -->
    <!-- static camera that moves according to the device movemenents -->
    <a-entity camera>
    <a-cursor></a-cursor>
    </a-entity>
  </a-scene>
</body>
